# ==============================================================================
# Docker Compose — Development (Live Preview / Hot Reload)
# ==============================================================================
# Usage:
#   pnpm docker:dev:up     → Start all services with live reload
#   pnpm docker:dev:down   → Stop all services
#   pnpm docker:dev:logs   → View logs
#
# How it works:
#   - Source code is mounted from host into containers via volumes
#   - Next.js dev server (HMR) and tsx watch auto-reload on file save
#   - No rebuild needed — just Ctrl+S and see changes instantly
# ==============================================================================

services:
  nginx:
    image: nginx:alpine
    container_name: wms-nginx-dev
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fe-wms
      - be-wms
    networks:
      - wms-dev-network
    restart: unless-stopped

  fe-wms:
    build:
      context: .
      dockerfile: apps/fe-wms/Dockerfile.dev
    container_name: fe-wms-dev
    environment:
      - NODE_ENV=development
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://api.wms.localhost
      - WATCHPACK_POLLING=true
    volumes:
      # Mount source code for hot reload
      - ./apps/fe-wms/src:/app/apps/fe-wms/src
      - ./apps/fe-wms/next.config.ts:/app/apps/fe-wms/next.config.ts
      - ./apps/fe-wms/postcss.config.mjs:/app/apps/fe-wms/postcss.config.mjs
      - ./apps/fe-wms/tsconfig.json:/app/apps/fe-wms/tsconfig.json
      - ./apps/fe-wms/.env.local:/app/apps/fe-wms/.env.local:ro
      # Mount shared packages for cross-package changes
      - ./packages/shared-types/src:/app/packages/shared-types/src
      # Prevent host node_modules from overriding container's
      - fe-wms-node-modules:/app/node_modules
      - fe-wms-app-node-modules:/app/apps/fe-wms/node_modules
      - fe-wms-next-cache:/app/apps/fe-wms/.next
    ports:
      - "3000:3000"
    networks:
      - wms-dev-network
    restart: unless-stopped

  be-wms:
    build:
      context: .
      dockerfile: apps/be-wms/Dockerfile.dev
    container_name: be-wms-dev
    environment:
      - NODE_ENV=development
      - BE_WMS_PORT=4000
      - BE_WMS_CORS_ORIGIN=http://app.wms.localhost,http://localhost:3000
    env_file:
      - .env.local
    volumes:
      # Mount source code for hot reload (tsx watch)
      - ./apps/be-wms/src:/app/apps/be-wms/src
      - ./apps/be-wms/tsconfig.json:/app/apps/be-wms/tsconfig.json
      # Mount shared packages
      - ./packages/shared-types/src:/app/packages/shared-types/src
      # Prevent host node_modules from overriding container's
      - be-wms-node-modules:/app/node_modules
      - be-wms-app-node-modules:/app/apps/be-wms/node_modules
    ports:
      - "4000:4000"
    networks:
      - wms-dev-network
    restart: unless-stopped

networks:
  wms-dev-network:
    driver: bridge

# Named volumes to persist node_modules inside containers
# (prevents host Windows node_modules from conflicting with Linux container)
volumes:
  fe-wms-node-modules:
  fe-wms-app-node-modules:
  fe-wms-next-cache:
  be-wms-node-modules:
  be-wms-app-node-modules:
