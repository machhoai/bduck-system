services:
  nginx:
    image: nginx:alpine
    container_name: wms-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fe-wms
      - be-wms
    networks:
      - wms-network
    restart: unless-stopped

  be-wms:
    build:
      context: .
      dockerfile: apps/be-wms/Dockerfile
    container_name: be-wms
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - BE_WMS_PORT=4000
      - BE_WMS_CORS_ORIGIN=${BE_WMS_CORS_ORIGIN:-http://app.wms.localhost}
    ports:
      - "4000:4000"
    networks:
      - wms-network
    restart: unless-stopped

  fe-wms:
    build:
      context: .
      dockerfile: apps/fe-wms/Dockerfile
      args:
        - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
        - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_LEAVE_FEATURE_ENABLED=${NEXT_PUBLIC_LEAVE_FEATURE_ENABLED:-false}
    container_name: fe-wms
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://api.wms.localhost
    ports:
      - "3000:3000"
    networks:
      - wms-network
    restart: unless-stopped

networks:
  wms-network:
    driver: bridge
